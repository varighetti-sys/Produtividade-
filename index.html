<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação Impacto - PMESP</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --azul: #0a1628; --azul-medio: #122040; --azul-claro: #1a3a6b;
            --dourado: #c9a227; --dourado-claro: #e8c050; --vermelho: #c0392b;
            --verde: #1e8449; --cinza: #8a9bb5; --branco: #f0f4ff;
            --text: #d0daf0; --borda: rgba(201,162,39,0.25); --card: rgba(18,32,64,0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--azul); color: var(--text); font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(201,162,39,0.04) 60px),
                              repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(201,162,39,0.04) 60px);
        }
        .header {
            background: linear-gradient(135deg, #060e1f 0%, var(--azul-medio) 100%);
            border-bottom: 2px solid var(--dourado); padding: 0 2rem;
            display: none; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        .header-brand { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; }
        .header-logo {
            width: 56px; height: 56px; background: var(--dourado);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--azul);
        }
        .header-title h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; color: var(--dourado); }
        .nav-btn {
            background: transparent; border: 1px solid var(--borda); color: var(--cinza);
            padding: 0.5rem 1.2rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }
        .nav-btn.active, .nav-btn:hover { background: var(--dourado); color: var(--azul); }
        .page { display: none; padding: 2rem; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

        /* LOGIN & FORMS */
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); border: 1px solid var(--borda); padding: 3rem; width: 420px; backdrop-filter: blur(12px); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.75rem; color: var(--cinza); margin-bottom: 0.4rem; }
        .form-group input, .form-group select {
            width: 100%; background: rgba(10,22,40,0.8); border: 1px solid rgba(138,155,181,0.25);
            color: var(--branco); padding: 0.75rem; outline: none;
        }
        .btn-primary {
            width: 100%; background: var(--dourado); border: none; padding: 0.85rem;
            font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .toggle-link { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; }
        .toggle-link a { color: var(--dourado); cursor: pointer; }
    </style>
</head>
<body>

    <header class="header" id="main-header">
        <div class="header-brand">
            <div class="header-logo">PM</div>
            <div class="header-title"><h1>Operação Impacto</h1></div>
        </div>
        <nav>
            <button class="nav-btn active" onclick="goPage('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="goPage('novo-registro')">Novo Registro</button>
        </nav>
        <div style="display:flex; gap:1rem; align-items:center;">
            <span id="user-display" style="font-size:0.8rem; color:var(--dourado)"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid var(--vermelho); color:var(--vermelho); cursor:pointer; padding:4px 8px;">Sair</button>
        </div>
    </header>

    <div id="page-login" class="page active">
        <div class="login-wrap">
            <div class="login-card">
                <div id="login-form">
                    <h2 style="color:var(--dourado); text-align:center; margin-bottom:1.5rem;">ACESSO</h2>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="login-email" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="login-senha" placeholder="••••••••">
                    </div>
                    <button class="btn-primary" onclick="fazerLogin()">ENTRAR</button>
                    <div class="toggle-link">Não tem conta? <a onclick="toggleForm()">Cadastre-se</a></div>
                </div>

                <div id="cadastro-form" style="display:none;">
                    <h2 style="color:var(--dourado); text-align:center; margin-bottom:1.5rem;">CADASTRO</h2>
                    <div class="form-group"><label>Nome</label><input type="text" id="cad-nome"></div>
                    <div class="form-group"><label>Matrícula</label><input type="text" id="cad-matricula"></div>
                    <div class="form-group"><label>Posto</label>
                        <select id="cad-posto"><option>Sd PM</option><option>Cb PM</option><option>Sgt PM</option><option>Ten PM</option></select>
                    </div>
                    <div class="form-group"><label>E-mail</label><input type="email" id="cad-email"></div>
                    <div class="form-group"><label>Senha</label><input type="password" id="cad-senha"></div>
                    <button class="btn-primary" onclick="fazerCadastro()">CRIAR CONTA</button>
                    <div class="toggle-link">Já tem conta? <a onclick="toggleForm()">Voltar</a></div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-dashboard" class="page">
        <h2 style="color:var(--dourado); border-bottom:1px solid var(--borda); padding-bottom:10px;">DASHBOARD</h2>
        <p style="margin-top:20px;">Bem-vindo ao sistema de produtividade da Operação Impacto.</p>
        </div>

    <div id="page-novo-registro" class="page">
        <h2 style="color:var(--dourado); border-bottom:1px solid var(--borda); padding-bottom:10px;">NOVO REGISTRO</h2>
        <div style="margin-top:20px; background:var(--azul-medio); padding:20px; border:1px solid var(--borda);">
            <p>Formulário de produtividade em desenvolvimento...</p>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO SUPABASE ---
        const SUPABASE_URL = 'https://pahuwyialgafhxgrlehm.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_QQZL_V5TyLiTK6ctdW1AbA_RaEttn0w';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- NAVEGAÇÃO ---
        function goPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            if(pageId === 'login') {
                document.getElementById('main-header').style.display = 'none';
            } else {
                document.getElementById('main-header').style.display = 'flex';
            }
        }

        function toggleForm() {
            const login = document.getElementById('login-form');
            const cad = document.getElementById('cadastro-form');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            cad.style.display = cad.style.display === 'none' ? 'block' : 'none';
        }

        // --- LÓGICA DE USUÁRIO ---
        async function fazerCadastro() {
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            const nome = document.getElementById('cad-nome').value;
            const matricula = document.getElementById('cad-matricula').value;
            const posto = document.getElementById('cad-posto').value;

            try {
                const { data, error } = await sb.auth.signUp({ email, password: senha });
                if (error) throw error;

                if (data.user) {
                    const { error: pError } = await sb.from('perfis').insert([
                        { id: data.user.id, nome, matricula, posto }
                    ]);
                    if (pError) throw pError;
                    alert("Cadastro realizado! Faça login.");
                    toggleForm();
                }
            } catch (e) {
                alert("Erro: " + e.message);
            }
        }

        async function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
                if (error) throw error;
                
                document.getElementById('user-display').innerText = email;
                goPage('dashboard');
            } catch (e) {
                alert("Erro ao conectar: Verifique e-mail/senha.");
            }
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        // Verificar sessão ao carregar
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('user-display').innerText = session.user.email;
                goPage('dashboard');
            }
        };
    </script>
</body>
</html>
